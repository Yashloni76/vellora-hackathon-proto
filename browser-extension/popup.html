<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, sans-serif;
      padding: 20px;
    }
    .logo {
      color: #00ff88;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .subtitle {
      color: #6b7280;
      font-size: 11px;
      margin-bottom: 20px;
    }
    .status {
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      text-align: center;
    }
    .status.connected {
      background: rgba(0,255,136,0.1);
      border: 1px solid rgba(0,255,136,0.3);
      color: #00ff88;
    }
    .status.disconnected {
      background: rgba(255,68,68,0.1);
      border: 1px solid rgba(255,68,68,0.3);
      color: #ff4444;
    }
    label {
      display: block;
      color: #6b7280;
      font-size: 10px;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px;
      background: #111311;
      border: 1px solid #1f2b1f;
      border-radius: 8px;
      color: #fff;
      font-size: 12px;
      outline: none;
      margin-bottom: 12px;
    }
    input:focus { border-color: #00ff88; }
    button {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #00ff88, #00cc6a);
      border: none;
      border-radius: 8px;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .open-symp {
      background: transparent;
      border: 1px solid #1f2b1f;
      color: #6b7280;
      margin-bottom: 0;
    }
    .info {
      color: #6b7280;
      font-size: 10px;
      text-align: center;
      margin-top: 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="logo">SYMP's</div>
  <div class="subtitle">Smart Your Money Plan</div>

  <div id="status" class="status disconnected">
    ⚠️ Not connected to SYMP
  </div>

  <label>SYMP APP URL</label>
  <input
    type="text"
    id="symp-url"
    placeholder="https://your-symp-app.vercel.app"
  />

  <label>YOUR AUTH TOKEN</label>
  <input
    type="password"
    id="symp-token"
    placeholder="Paste your token here"
  />

  <button id="save-btn">Connect to SYMP</button>
  <button class="open-symp" id="open-symp">
    Open SYMP App
  </button>

  <div class="info">
    After connecting, the extension will automatically
    detect purchases and help you log them to SYMP
  </div>

  <script src="popup.js"></script>
</body>
</html>
